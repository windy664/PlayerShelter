# ============================================================
# PlayerShelter 等级配置
# ============================================================
# 本文件集中管理所有“随等级变化”的配置。
#
# 配置结构：
# levels.<等级>.side-chunks        正方形可用边长，单位是 chunk
# levels.<等级>.caps.admin         副主人名额
# levels.<等级>.caps.trust         共建成员名额
# levels.<等级>.upgrade.money      升到本等级需要的 Vault 金钱，0 表示不扣钱
# levels.<等级>.upgrade.items      升到本等级需要扣除的材料
# levels.<等级>.limits             本等级实体、掉落物、方块实体、机器限额
#
# 重要说明：
# - PlayerShelter 使用 WorldBorder 做实际限制，不维护独立 chunk 集合。
# - side-chunks 表示“正方形边长”，单位是 chunk。
# - 例如 side-chunks=6 表示 6x6 chunk，可用边界边长为 96 格。
# - WorldBorder 从庄园角点向 +X/+Z 扩展，便于未来从 GuildShelter 迁移坐标。
# - upgrade 写在“目标等级”里；例如 levels.2.upgrade 表示 1 级升到 2 级的费用。
# - 已创建庄园会冻结布局参数；修改本文件主要影响新建庄园和后续升级读取。

