# 保护开关页。这里放庄园常用快捷开关；完整列表仍可用 /ps flags 查看。
title: "&0保护开关"
size: 54
pane-material: GRAY_STAINED_GLASS_PANE

items:
  summary:
    index: 4
    material: SHIELD
    name: "&c保护开关"
    lore:
      - "&7当前开启: &f{flags_on}/{flags_total}"
      - "&7左键查看当前全部 flag 文本列表。"
      - "&8下面这些按钮可直接翻转常用规则。"
    action: "command:ps flags"

  pvp:
    index: 19
    material: DIAMOND_SWORD
    name: "&cPvP &7[{pvp_state}]"
